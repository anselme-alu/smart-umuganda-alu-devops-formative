server {
    listen 80;
    server_name localhost; # Change this to your domain name or IP address if applicable

    # Path to your compiled React build files
    root /var/www/html;
    index index.html;

    location / {
        # Check if the requested file exists, otherwise fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets to maximize loading speed
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
