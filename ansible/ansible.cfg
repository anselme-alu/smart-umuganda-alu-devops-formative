[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
remote_user          = ubuntu
private_key_file     = ../terraform/smart-umuganda-key
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = default
result_format        = yaml
interpreter_python   = auto_silent

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
