---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true

# Rules are added before the firewall is enabled so the SSH session survives.
- name: UFW - default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW - default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: UFW - allow required TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: UFW - enable firewall
  community.general.ufw:
    state: enabled

- name: Deploy SSH hardening drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible — SSH hardening
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      PermitEmptyPasswords no
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
  notify: Restart ssh

- name: Validate full sshd configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false

- name: Configure fail2ban sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [sshd]
      enabled  = true
      port     = {{ ssh_port }}
      maxretry = 5
      findtime = 10m
      bantime  = 1h
  notify: Restart fail2ban

- name: Ensure fail2ban is running and enabled
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
