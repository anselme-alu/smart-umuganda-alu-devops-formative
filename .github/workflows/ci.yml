name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Run linter
        run: yarn lint

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Run linter
        run: yarn lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build backend Docker image
        run: docker build -t smart-umuganda-backend .

      - name: Build frontend Docker image
        run: docker build -t smart-umuganda-frontend ./frontend

      - name: Scan backend image with Trivy
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: smart-umuganda-backend
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os
          trivy-config: .trivy.yaml
          trivyignores: .trivyignore
          skip-dirs: /usr/local/share/.cache

      - name: Scan frontend image with Trivy
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: smart-umuganda-frontend
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os
          trivy-config: .trivy.yaml
          trivyignores: .trivyignore

  dependency-scan:
    name: Dependency Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: ${{ matrix.project }}/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit (high and critical)
        run: |
          yarn audit --json > audit.json || true
          node -e "
            const fs = require('fs');
            const summary = fs.readFileSync('audit.json', 'utf8')
              .trim()
              .split('\n')
              .map((line) => { try { return JSON.parse(line); } catch { return null; } })
              .find((entry) => entry && entry.type === 'auditSummary');
            if (!summary) {
              console.error('Could not parse yarn audit output');
              process.exit(1);
            }
            const v = summary.data.vulnerabilities;
            console.log('Audit counts:', v);
            if ((v.high || 0) + (v.critical || 0) > 0) process.exit(1);
          "

  iac-scan:
    name: IaC Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run tfsec on Terraform
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          additional_args: --minimum-severity HIGH
