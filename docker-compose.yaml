services:
  datastore:
    image: postgres:16-alpine
    container_name: smart_umuganda_datastore
    environment:
      POSTGRES_USER: smart_umuganda_pg_user
      POSTGRES_PASSWORD: smart_umuganda_pg_password
      POSTGRES_DB: smart_umuganda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_umuganda_pg_user -d smart_umuganda"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
    ports:
      - "8000:8000"
    environment:
        DATABASE_URL: postgres://smart_umuganda_pg_user:smart_umuganda_pg_password@datastore:5432/smart_umuganda
        FRONTEND_URL: http://localhost:5001
        JWT_SECRET: demo-jwt-secret-40e67a13-181f-405d-bdb3-69710909e7bb
    depends_on:
      datastore:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    ports:
      - "5001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
